name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install XcodeGen
        run: |
          brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate

      - name: Build and Test
        run: |
          DEVICE_NAME=$(python3 -c '
          import json, subprocess
          try:
              output = subprocess.check_output(["xcrun", "simctl", "list", "devices", "-j"])
              data = json.loads(output)
              found_device = None
              runtimes = sorted(data.get("devices", {}).keys(), reverse=True)
              for runtime in runtimes:
                  if "iOS" not in runtime: continue
                  devices = data["devices"][runtime]
                  for d in devices:
                      if d.get("isAvailable", True) and d.get("availabilityError") is None and "iPhone" in d.get("name", ""):
                          found_device = d
                          break
                  if found_device: break
              if found_device:
                  print(found_device["name"])
              else:
                  print("iPhone 17 Pro")
          except Exception:
              print("iPhone 17 Pro")
          ')
          echo "Selected Device: $DEVICE_NAME"
          xcodebuild -scheme PillDaddy -destination "platform=iOS Simulator,name=$DEVICE_NAME" test -quiet

