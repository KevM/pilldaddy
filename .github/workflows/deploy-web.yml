name: Deploy Web to Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 2

      - name: Check if web files changed
        id: check_web
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '^(web/|\.github/workflows/deploy-web\.yml)'; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Pull Vercel Environment Information
        if: steps.check_web.outputs.changed == 'true'
        run: npx -y vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.check_web.outputs.changed == 'true'
        run: npx -y vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
