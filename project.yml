name: RoutineDosePlanner
options:
  bundleIdPrefix: rodeo.fm
settings:
  base:
    DEVELOPMENT_TEAM: 6HQGHHRK87
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
targets:
  RoutineDosePlanner:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - RoutineDosePlanner
    info:
      path: RoutineDosePlanner/Info.plist
      properties:
        CFBundleDisplayName: Routine Dose Planner
        UILaunchScreen:
          StoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UIBackgroundModes:
          - remote-notification
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - routine
        NSHealthUpdateUsageDescription: Routine Dose Planner saves the patient's health readings to Apple Health.
        LSApplicationQueriesSchemes:
          - x-apple-health

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rodeo.fm.routine
        CODE_SIGN_ENTITLEMENTS: RoutineDosePlanner/RoutineDosePlanner.entitlements
    dependencies:
      - target: RoutineDosePlannerWidgets
        embed: true
  RoutineDosePlannerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - RoutineDosePlannerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RoutineDosePlanner
  RoutineDosePlannerWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - RoutineDosePlannerWidgets
      - path: RoutineDosePlanner/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rodeo.fm.routine.widgets
    info:
      path: RoutineDosePlannerWidgets/Info.plist
      properties:
        CFBundleDisplayName: Routine Reminders
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
schemes:
  RoutineDosePlanner:
    build:
      targets:
        RoutineDosePlanner: all
        RoutineDosePlannerTests: [test]
        RoutineDosePlannerWidgets: all
    run:
      debugEnabled: false
    test:
      targets:
        - RoutineDosePlannerTests
